<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMD Player</title>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.core.js",
      "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.webgpu.js",
      "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.tsl.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>

  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #232323;
      --surface: #2a2a2a;
      --border: #2f2f2f;
      --text: #d4d4d4;
      --text-dim: #999;
      --accent: #5b9bd5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      font-weight: 500;
      color: var(--text-dim);
      z-index: 5;
      pointer-events: none;
    }

    /* Controls bar */
    #controls {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 20;
    }

    #controls button, #controls select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    #controls button:hover, #controls select:hover {
      background: var(--panel);
    }

    #controls button:disabled, #controls select:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #controls select {
      max-width: 180px;
    }

    #volume {
      width: 80px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* Timeline scrubber */
    #timeline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 80px;
    }

    #tl-current, #tl-total {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      user-select: none;
    }

    #tl-track {
      flex: 1;
      padding: 10px 0;
      position: relative;
      cursor: pointer;
      touch-action: none;
      user-select: none;
    }

    #tl-bar {
      height: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      pointer-events: none;
    }

    #tl-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 100%;
      transform-origin: left;
      transform: scaleX(0);
      will-change: transform;
    }

    #tl-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    #tl-track:hover #tl-thumb,
    #timeline.dragging #tl-thumb {
      opacity: 1;
    }

    #timeline.dragging {
      user-select: none;
    }

    .separator {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    /* Row 2: Model controls */
    #controls-model,
    #controls-hand-fx,
    #controls-bg-fx {
      position: fixed;
      left: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 20;
    }

    #controls-model { top: 44px; right: 12px; }
    #controls-hand-fx { top: 76px; }
    #controls-bg-fx { top: 108px; }

    #controls-model button,
    #controls-model select,
    #controls-hand-fx select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    #controls-model button:hover,
    #controls-model select:hover,
    #controls-hand-fx select:hover {
      background: var(--panel);
    }

    #controls-bg-fx label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
    }

    #controls-bg-fx input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    #controls-model select:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #controls-model select {
      max-width: 180px;
    }

    #loading-status {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* Debug info */
    #debug-info {
      position: fixed;
      top: 140px;
      left: 12px;
      max-width: 450px;
      font-size: 11px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      color: var(--text-dim);
      z-index: 20;
      line-height: 1.6;
      user-select: text;
      word-break: break-word;
    }

    #debug-info:not(:empty) {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 8px 10px;
    }

    #debug-info .remap { color: #e5c07b; }
    #debug-info .drop { color: #e06c75; }
    #debug-info .score-good { color: #98c379; }
    #debug-info .score-fair { color: #e5c07b; }
    #debug-info .score-poor { color: #e06c75; font-weight: 500; }
    #debug-info .warn { color: #e5c07b; }

    /* WebGPU fallback */
    .fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .fallback h2 {
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .fallback p {
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="title">MMD Player</div>

  <div id="debug-info"></div>

  <div id="controls">
    <select id="select-artist"><option value="">Artist</option></select>
    <select id="select-song" disabled><option value="">Song</option></select>
    <div class="separator"></div>
    <button id="btn-playpause">&#9655;</button>
    <div id="timeline">
      <span id="tl-current">0:00 f0</span>
      <div id="tl-track">
        <div id="tl-bar"><div id="tl-fill"></div></div>
        <div id="tl-thumb"></div>
      </div>
      <span id="tl-total">0:00 f0</span>
    </div>
    <button id="btn-mute" class="toggle muted">&#128263;</button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div id="controls-model">
    <button id="btn-upload-zip">Upload ZIP</button>
    <select id="select-pmx" disabled><option value="">PMX</option></select>
    <span id="loading-status"></span>
  </div>

  <div id="controls-bg-fx">
    <label><input type="checkbox" id="chk-rise" checked> Rise</label>
    <label><input type="checkbox" id="chk-fall"> Fall</label>
    <label><input type="checkbox" id="chk-ripple" checked> Ripple</label>
    <label><input type="checkbox" id="chk-mirror" checked> Mirror</label>
  </div>

  <input type="file" id="input-zip" accept=".zip" hidden>

  <script>
    if (!navigator.gpu) {
      document.body.innerHTML = '<div class="fallback"><div><h2>WebGPU Required</h2><p>This app requires WebGPU, available in Chrome/Edge 113+ and Safari 18+.</p></div></div>';
    } else {
      const s = document.createElement('script');
      s.type = 'module';
      s.src = 'js/main.js';
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
